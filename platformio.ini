[env:r8n16-esp32s3]
; 基础平台配置 - 使用esp32-s3-devkitc-1作为基础(第三方R8N16开发板)
; R8N16: ESP32-S3 + 16MB Flash(QIO) + 8MB PSRAM(Octal)
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; Flash 配置 - 16MB QIO Flash
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216    ; 16MB = 16777216 bytes
board_build.arduino.memory_type = qio_opi   ; Flash=QIO, PSRAM=OPI(八口)
board_build.partitions = partitions.csv

; PSRAM 配置 - 8MB Octal PSRAM
board_build.psram_mode = octal          ; 八口PSRAM模式
board_upload.maximum_ram_size = 8388608 ; 8MB PSRAM = 8388608 bytes

; 编译标志 - 硬件配置
build_flags =
    ; PSRAM 配置 - 开启 PSRAM 并优先使用 PSRAM 分配内存
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_CACHE_WORKAROUND=1
    
    ; USB 配置
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    
    ; TFT 显示屏配置 (ILI9341)
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_MISO=13
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=46
    -DTFT_RST=-1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=40000000
    
    ; LVGL 图形库配置
    -DLV_CONF_SKIP=1
    -DLV_MEM_CUSTOM=1
    -DLV_COLOR_DEPTH=16
    -DLV_TICK_CUSTOM=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_32=1    ; 新增：启用 32 像素高清字体
    -DLV_FONT_MONTSERRAT_48=1    ; 新增：启用 48 像素超大字体
    -DLV_FONT_SIMSUN_16_CJK=1

; 依赖库配置
lib_deps =
    ; 显示相关
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ~8.3.11
    
    ; 音频相关
    esphome/ESP32-audioI2S @ ^2.0.7
    
    ; LED 控制
    adafruit/Adafruit NeoPixel @ ^1.11.0
    
    ; JSON 解析
    bblanchon/ArduinoJson @ ^7.0.4

; 串口监视器配置
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0