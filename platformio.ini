[env:esp32-s3-devkitc-1]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; Flash 和 RAM 的基础配置
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216    ; 【关键】明确限制最大16MB，防止边界越界
board_build.arduino.memory_type = qio_opi
board_build.psram_mode = octal          ; 启用 PSRAM 八路模式
board_upload.maximum_ram_size = 8388608 ; 8MB PSRAM

board_build.partitions = partitions.csv
board_build.filesystem = littlefs       ; 明确使用 LittleFS 编译文件系统

build_flags = 
    ; 硬件与屏幕引脚配置
    -DBOARD_HAS_PSRAM
    -DUSER_SETUP_LOADED=1         
    -DILI9341_DRIVER=1            
    -DTFT_MISO=13                 
    -DTFT_MOSI=11                 
    -DTFT_SCLK=12                 
    -DTFT_CS=10                   
    -DTFT_DC=46                   
    -DTFT_RST=-1                  
    -DLOAD_GLCD=1                 
    -DSPI_FREQUENCY=40000000
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

    -DLV_CONF_SKIP=1  
    -DLV_MEM_CUSTOM=1
    -DLV_COLOR_DEPTH=16                   
    -DLV_TICK_CUSTOM=1                    
    -DLV_FONT_MONTSERRAT_16=1             
    -DLV_FONT_SIMSUN_16_CJK=1           

lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ~8.3.11
    esphome/ESP32-audioI2S @ ^2.0.7
    adafruit/Adafruit NeoPixel @ ^1.11.0

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0